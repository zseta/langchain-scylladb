name: Publish to PyPI

on:
  push:
    tags:
      - "langchain-scylladb-*"
      - "langgraph-checkpoint-scylladb-*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - langchain-scylladb
          - langgraph-checkpoint-scylladb

jobs:
  publish-langchain-scylladb:
    name: "Publish langchain-scylladb"
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/langchain-scylladb-')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'langchain-scylladb')
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.11"

      - name: Build package
        working-directory: libs/langchain-scylladb
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true

  publish-langgraph-checkpoint-scylladb:
    name: "Publish langgraph-checkpoint-scylladb"
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/langgraph-checkpoint-scylladb-')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'langgraph-checkpoint-scylladb')
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"

      - name: Build package
        working-directory: libs/langgraph-checkpoint-scylladb
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
