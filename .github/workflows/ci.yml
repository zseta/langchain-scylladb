name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - "*.md"
      - "*.rst"
      - docs/**
      - .gitignore
  workflow_dispatch:

jobs:
  unit-tests-langchain:
    name: "langchain-scylladb unit tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: libs/langchain-scylladb
        run: uv sync --all-groups

      - name: Run unit tests
        working-directory: libs/langchain-scylladb
        run: uv run pytest tests/unit_tests/

  unit-tests-langgraph:
    name: "langgraph-checkpoint-scylladb unit tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: libs/langgraph-checkpoint-scylladb
        run: uv sync --all-groups

      - name: Run unit tests
        working-directory: libs/langgraph-checkpoint-scylladb
        run: uv run pytest tests/unit_tests/
