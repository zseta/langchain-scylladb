name: Integration Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "*.rst"
      - docs/**
      - .gitignore
  workflow_dispatch:

jobs:
  integration-tests-langchain:
    name: "langchain-scylladb integration tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: libs/langchain-scylladb
        run: uv sync --all-groups

      - name: Run integration tests
        working-directory: libs/langchain-scylladb
        run: uv run pytest tests/integration_tests/ -v

  integration-tests-langgraph:
    name: "langgraph-checkpoint-scylladb integration tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: libs/langgraph-checkpoint-scylladb
        run: uv sync --all-groups

      - name: Run integration tests
        working-directory: libs/langgraph-checkpoint-scylladb
        run: uv run pytest tests/integration_tests/ -v

